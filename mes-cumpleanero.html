<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mes Cumpleañero 🌻</title>
<style>
  :root{
    --cream:#f6ede0;
    --ink:#2b2b2b;
    --petal:#f4b400;
    --petal-dark:#d99400;
    --center:#6b4226;
    --center-dark:#4a2c17;
    --stem:#2f7d4f;
    --stem-dark:#1f5c38;
    --pink1:#7a0e3d;
    --pink2:#c2185b;
    --pink3:#ff4f9a;
  }

  * { box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background: radial-gradient(circle at 50% 0%, var(--pink3), var(--pink2) 45%, var(--pink1) 100%);
    font-family:'Segoe UI', Tahoma, sans-serif;
    overflow:hidden;
    position:relative;
  }

  /* corazones flotantes de fondo */
  .bg-heart{
    position:fixed;
    top:110%;
    font-size: 20px;
    color: rgba(255,255,255,0.25);
    animation: floatUp linear infinite;
    pointer-events:none;
  }
  @keyframes floatUp{
    0%{ transform: translateY(0) rotate(0deg); opacity:0; }
    10%{ opacity:1; }
    90%{ opacity:1; }
    100%{ transform: translateY(-120vh) rotate(20deg); opacity:0; }
  }

  .app{
    position:relative;
    width:400px;
    max-width:92vw;
  }

  .header{
    text-align:center;
    color:#fff;
    font-weight:700;
    letter-spacing:2px;
    font-size:14px;
    margin-bottom:14px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }

  .card{
    position:relative;
    background: var(--cream);
    border-radius: 22px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    padding: 22px 18px 16px;
    display:flex;
    flex-direction:column;
    gap: 10px;
  }

  .content{
    display:flex;
    gap: 10px;
    align-items:flex-start;
  }

  .text-col{
    flex: 1;
    font-size: 13px;
    line-height:1.55;
    color: var(--ink);
    padding-top: 6px;
  }
  .text-col p{ margin: 0 0 12px 0; }
  .glow{
    display:inline-block;
    width:6px; height:6px;
    background: var(--petal);
    border-radius:50%;
    box-shadow: 0 0 6px var(--petal);
    margin-left:2px;
  }

  .tree-col{
    width: 160px;
    height: 210px;
    position: relative;
    flex-shrink:0;
    display:flex;
    align-items:flex-end;
    justify-content:center;
  }

  /* mini girasol decorativo */
  .mini{
    position:absolute;
    left:6px;
    bottom:14px;
    width:24px;
    height:24px;
    opacity:.9;
  }
  .mini .p{
    position:absolute;
    width:10px;
    height:14px;
    background: var(--petal);
    border-radius:50% 50% 0 0;
    top:50%; left:50%;
    transform-origin: 50% 100%;
    margin-left:-5px;
    margin-top:-14px;
  }
  .mini .c{
    position:absolute;
    width:10px;
    height:10px;
    background: var(--center);
    border-radius:50%;
    top:50%; left:50%;
    margin-left:-5px;
    margin-top:-5px;
    z-index:2;
  }

  .flower-wrap{
    position:relative;
    width:150px;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
  }

  .stem{
    width:6px;
    height:0;
    background: linear-gradient(180deg, var(--stem), var(--stem-dark));
    border-radius:4px;
    transition: height 1.6s cubic-bezier(.2,.8,.2,1);
  }
  .stem.grow{ height: 100px; }

  .leaf{
    position:absolute;
    width:0;
    height:0;
    opacity:0;
    transition: opacity .5s ease .9s, width .6s ease .9s, height .6s ease .9s;
  }
  .leaf svg{ width:100%; height:100%; display:block; }
  .leaf.left{ left: 46%; bottom: 60px; transform: translateX(-100%) rotate(15deg); }
  .leaf.right{ right: 46%; bottom: 36px; transform: translateX(100%) scaleX(-1) rotate(15deg); }
  .leaf.show{ opacity:1; width:42px; height:30px; }

  .bloom{
    position:relative;
    width:0;
    height:0;
    opacity:0;
    transform: scale(0.2);
    transition: opacity .7s ease .5s, transform .7s cubic-bezier(.34,1.56,.64,1) .5s, width .7s ease .5s, height .7s ease .5s;
  }
  .bloom.show{
    width:104px;
    height:104px;
    opacity:1;
    transform: scale(1);
  }

  .petal{
    position:absolute;
    width:24px;
    height:42px;
    background: linear-gradient(180deg, var(--petal), var(--petal-dark));
    border-radius: 50% 50% 45% 45%;
    top:50%; left:50%;
    margin-top:-52px;
    margin-left:-12px;
    transform-origin: 50% 52px;
  }

  .core{
    position:absolute;
    width:48px;
    height:48px;
    top:50%; left:50%;
    margin-top:-24px;
    margin-left:-24px;
    background: radial-gradient(circle at 35% 35%, var(--center) 0%, var(--center-dark) 80%);
    border-radius:50%;
    box-shadow: inset 0 -4px 6px rgba(0,0,0,0.3);
    z-index:3;
  }

  .counter-wrap{
    border-top: 1px solid rgba(0,0,0,0.12);
    padding-top: 10px;
    font-size: 12.5px;
    color: var(--ink);
  }
  .counter-label{ margin-bottom:4px; opacity:.85; }
  .counter-value{
    font-weight:700;
    font-size: 14px;
    color:#3a2a10;
    letter-spacing:0.3px;
  }

  .attrib{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 10px 4px 0;
    color:#fff;
    font-size: 13px;
    font-weight:700;
  }
  .attrib .more{ opacity:.85; font-weight:600; }
</style>
</head>
<body>

<div class="app">
  <div class="header">MES CUMPLEAÑERO</div>

  <div class="card">
    <div class="content">
      <div class="text-col">
        <p>Feliz inicio de tu mes cumpleañero</p>
        <p>Espero cumplas con todos tus objetivos</p>
        <p>Te deseo lo mejor en este mundo</p>
        <p>Te amo muchísimo...<span class="glow"></span></p>
      </div>
      <div class="tree-col">
        <div class="mini" id="mini"></div>
        <div class="flower-wrap">
          <div class="bloom" id="bloom"></div>
          <div class="leaf left" id="leafL">
            <svg viewBox="0 0 60 44"><path d="M2,42 C10,10 40,2 58,4 C50,26 26,40 2,42 Z" fill="#2f7d4f"/></svg>
          </div>
          <div class="leaf right" id="leafR">
            <svg viewBox="0 0 60 44"><path d="M2,42 C10,10 40,2 58,4 C50,26 26,40 2,42 Z" fill="#2f7d4f"/></svg>
          </div>
          <div class="stem" id="stem"></div>
        </div>
      </div>
    </div>

    <div class="counter-wrap">
      <div class="counter-label">Ya inicio tu mes cumpleañero, falta:</div>
      <div class="counter-value" id="countdown">calculando...</div>
    </div>
  </div>

  <div class="attrib">
    <span>tú &amp; yo</span>
    <span class="more">más</span>
  </div>
</div>

<script>
  /* ---------- corazones flotantes de fondo ---------- */
  const bgCount = 22;
  for (let i = 0; i < bgCount; i++) {
    const h = document.createElement('div');
    h.className = 'bg-heart';
    h.textContent = '♥';
    h.style.left = Math.random()*100 + 'vw';
    h.style.fontSize = (12 + Math.random()*20) + 'px';
    h.style.animationDuration = (6 + Math.random()*8) + 's';
    h.style.animationDelay = (Math.random()*8) + 's';
    document.body.appendChild(h);
  }

  /* ---------- girasol único creciendo ---------- */
  const flowerCard = document.querySelector('.card');
  const stem = document.getElementById('stem');
  const bloom = document.getElementById('bloom');
  const leafL = document.getElementById('leafL');
  const leafR = document.getElementById('leafR');
  const miniEl = document.getElementById('mini');

  // pétalos del girasol grande (12 pétalos distribuidos en círculo)
  const numPetals = 12;
  for (let i = 0; i < numPetals; i++) {
    const petal = document.createElement('div');
    petal.className = 'petal';
    const angle = (360 / numPetals) * i;
    petal.style.transform = `rotate(${angle}deg)`;
    bloom.appendChild(petal);
  }
  const core = document.createElement('div');
  core.className = 'core';
  bloom.appendChild(core);

  // mini girasol decorativo (6 pétalos + centro)
  const numMini = 6;
  for (let i = 0; i < numMini; i++) {
    const p = document.createElement('div');
    p.className = 'p';
    p.style.transform = `rotate(${(360/numMini)*i}deg)`;
    miniEl.appendChild(p);
  }
  const miniCore = document.createElement('div');
  miniCore.className = 'c';
  miniEl.appendChild(miniCore);

  function playFlowerAnimation(){
    stem.classList.remove('grow');
    bloom.classList.remove('show');
    leafL.classList.remove('show');
    leafR.classList.remove('show');

    void flowerCard.offsetWidth;

    setTimeout(()=> stem.classList.add('grow'), 50);
    setTimeout(()=> { leafL.classList.add('show'); leafR.classList.add('show'); }, 700);
    setTimeout(()=> bloom.classList.add('show'), 1300);
  }

  flowerCard.addEventListener('click', playFlowerAnimation);
  window.addEventListener('load', playFlowerAnimation);

  /* ---------- contador regresivo ---------- */
  // Meta: 18 de julio de 2026, 00:00 (hora asumida, ajustable abajo)
  const targetDate = new Date(2026, 6, 18, 0, 0, 0); // mes 6 = julio (0-indexado)

  function updateCountdown(){
    const now = new Date();
    let diff = targetDate - now;
    const el = document.getElementById('countdown');

    if (diff <= 0){
      el.textContent = "¡Hoy es tu mes cumpleañero! 🎉";
      return;
    }

    const totalSeconds = Math.floor(diff/1000);
    const days = Math.floor(totalSeconds / 86400);
    const hours = Math.floor((totalSeconds % 86400) / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    el.textContent = `${days} días ${hours} horas ${minutes} minutos ${seconds} segundos`;
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>

</body>
</html>
